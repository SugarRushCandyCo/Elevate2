<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncy B-ball Trainer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="brand">
                <svg class="logo" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M6 12A6 6 0 0 1 18 12"></path>
                    <path d="M12 6A6 6 0 0 1 12 18"></path>
                </svg>
                <span>BBall Bouncy</span>
            </div>
            <div class="step-counter">Step 1 of 7</div>
        </header>

        <main class="main-content">
            <h2 class="step-title">Welcome to the Bouncy Basketball Trainer!</h2>
            <div class="random-line"></div>
        </main>

        <footer class="app-footer">
            <button class="btn btn-secondary" disabled>Back</button>
            <button class="btn btn-primary" disabled>Next</button>
        </footer>
    </div>

</body>
</html>
