<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <title>Elevate</title>
  <meta name="description" content="Build your personalized basketball training profile." />
  <!-- PWA -->
  <meta name="theme-color" content="#0A0A0D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Elevate" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/Elevate Logo.png" />
  <link rel="icon" href="assets/Elevate Logo.png" />

  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cloud.umami.is/script.js" data-website-id="6bcb85d3-9731-4675-a4c1-59ea0014a3fa"></script>
</head>
<body>

  <!-- Ambient animated gradient backdrop, sits behind everything -->
  <div class="backdrop" aria-hidden="true">
    <div class="glow glow--one"></div>
    <div class="glow glow--two"></div>
    <div class="court-lines"></div>
  </div>

  <!-- Initial load animation -->
  <div id="loader" class="loader" role="status" aria-label="Loading">
    <svg class="loader__ball" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="20" stroke="url(#loaderGrad)" stroke-width="3"/>
      <path d="M4 24H44" stroke="url(#loaderGrad)" stroke-width="2.5"/>
      <path d="M24 4V44" stroke="url(#loaderGrad)" stroke-width="2.5"/>
      <path d="M8 10C13 15 13 33 8 38" stroke="url(#loaderGrad)" stroke-width="2.5"/>
      <path d="M40 10C35 15 35 33 40 38" stroke="url(#loaderGrad)" stroke-width="2.5"/>
      <defs>
        <linearGradient id="loaderGrad" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
          <stop stop-color="#FF6B4A"/>
          <stop offset="1" stop-color="#B91C1C"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <main id="app" class="app" aria-live="polite">

    <!-- ============ SCREEN: WELCOME (root landing page) ============ -->
    <section id="screen-welcome" class="screen screen--welcome is-active" data-screen>
      <div class="screen__inner">
      <div class="welcome__content">
        <div class="brand">
          <span class="brand__mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="24" cy="24" r="19" stroke="url(#brandGrad)" stroke-width="2.5"/>
              <path d="M5 24H43" stroke="url(#brandGrad)" stroke-width="2"/>
              <path d="M24 5V43" stroke="url(#brandGrad)" stroke-width="2"/>
              <path d="M9 10.5C13.5 15.5 13.5 32.5 9 37.5" stroke="url(#brandGrad)" stroke-width="2"/>
              <path d="M39 10.5C34.5 15.5 34.5 32.5 39 37.5" stroke="url(#brandGrad)" stroke-width="2"/>
              <defs>
                <linearGradient id="brandGrad" x1="5" y1="5" x2="43" y2="43" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#FF6B4A"/>
                  <stop offset="1" stop-color="#B91C1C"/>
                </linearGradient>
              </defs>
            </svg>
          </span>
          <span class="brand__name">Elevate</span>
        </div>

        <h1 class="welcome__title" tabindex="-1">
          Welcome to your<br /><span class="text-gradient">basketball journey.</span>
        </h1>
        <p class="welcome__subtitle">
          Let's build your personalized training experience.
        </p>

        <button id="btn-start" class="btn btn--primary btn--large" type="button">
          <span>Start</span>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M3 9H15M15 9L10 4M15 9L10 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      </div>
    </section>

  </main>

  <script>
    // Root landing page: Start simply routes into the onboarding flow.
    // Loader is hidden once the page is ready, then Start navigates to /onboarding.
    document.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('loader');
      if (loader) {
        requestAnimationFrame(() => loader.classList.add('is-hidden'));
        setTimeout(() => loader.remove(), 500);
      }

      const btnStart = document.getElementById('btn-start');
      if (btnStart) {
        btnStart.addEventListener('click', () => {
          window.location.href = '/onboarding';
        });
      }
    });
  </script>
</body>
</html>
